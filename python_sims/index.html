import sys
import asyncio
import platform
from pathlib import Path

# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#1a1a1a"
    platform.window.transfer.hidden = True
    platform.window.canvas.style.visibility = "visible"

    # Wait for the page to be ready
    while embed.counter() < 0:
        await asyncio.sleep(.1)

    # Start the top-level async handler
    await TopLevel_async_handler.start_toplevel(platform.shell, console=False)

    # Load and run main.py
    try:
        main_code = """
import pygame
import sys

pygame.init()
WIDTH, HEIGHT = 1280, 720
screen = pygame.display.set_mode((WIDTH, HEIGHT))
pygame.display.set_caption("Python Simulation Launcher")

BLACK = (0, 0, 0)
WHITE = (255, 255, 255)
BLUE = (100, 150, 255)
GRAY = (200, 200, 200)

font_large = pygame.font.Font(None, 48)
font_medium = pygame.font.Font(None, 32)
font_small = pygame.font.Font(None, 24)

clock = pygame.time.Clock()

def draw_text(surface, text, font, color, pos):
    text_surface = font.render(text, True, color)
    surface.blit(text_surface, pos)

running = True
while running:
    for event in pygame.event.get():
        if event.type == pygame.QUIT:
            running = False
        elif event.type == pygame.KEYDOWN:
            if event.key == pygame.K_ESCAPE:
                running = False
    
    screen.fill(BLACK)
    
    draw_text(screen, "Python Simulation Launcher", font_large, BLUE, (50, 50))
    
    simulations = [
        "1. N-Body Gravity Simulation",
        "2. Particle System",
        "3. Wave Simulation",
        "4. Cellular Automata",
    ]
    
    y_offset = 150
    for sim in simulations:
        draw_text(screen, sim, font_medium, WHITE, (100, y_offset))
        y_offset += 80
    
    draw_text(screen, "Press ESC to exit", font_small, GRAY, (50, 650))
    
    pygame.display.flip()
    clock.tick(60)

pygame.quit()
"""
        exec(main_code)
    except Exception as e:
        print(f"Error running simulation: {e}")
        import traceback
        traceback.print_exc()

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("Simulation Launcher started successfully")

asyncio.run(custom_site())

    infobox.style.display = "block";

    const h = infobox.offsetHeight;

    // Center in viewport
    const left = (window.innerWidth - w) / 2;
    const top = (window.innerHeight - h) / 2;

    infobox.style.left = left + "px";
    infobox.style.top = top + "px";

    function info_online(url) {
        // display info about current APK
        fetch( url /*, options */)

            .then((html) => {
                info_inline(html);
        })
        .catch((error) => {
            console.warn(error);
