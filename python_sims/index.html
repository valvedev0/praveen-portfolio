<html lang="en-us"><script src="https://pygame-web.github.io/cdn/0.9.3/pythons.js" type=module id="site" data-python="python3.12" data-LINES=42 data-COLUMNS=132 data-os="vtx,snd,gui" async defer>#</script><head><script type="application/javascript">

config = {
    xtermjs : "1" ,
    _sdl2 : "canvas",

    user_canvas_managed : 0,
    gui_divider : 2,

    fb_height : "720"

function show_infobox() {
    if (typeof infobox !== 'undefined') {
        infobox.style.display = "block";
        const w = infobox.offsetWidth;
        const h = infobox.offsetHeight;
        const left = (window.innerWidth - w) / 2;
        const top = (window.innerHeight - h) / 2;
        infobox.style.left = left + "px";
        infobox.style.top = top + "px";
    }
}
</script>

    <title>Simulation Launcher</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" sizes="16x16">

    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@master/coi-serviceworker.min.js"></script>
    <script src="https://pygame-web.github.io/cdn/0.9.3/browserfs.min.js"></script>

    <style>
        #status { display: inline-block; vertical-align: top; margin-top: 20px; margin-left: 30px; font-weight: bold; color: rgb(120, 120, 120); }
        #progress { height: 20px; width: 300px; }
        #infobox { position: fixed; background: #2b2b2b; color: white; font-weight: bold; padding: 12px 24px; border: 1px solid white; z-index: 999999; }
        div.emscripten { text-align: center; }
        div.emscripten_border { border: 1px solid black; }
        canvas.emscripten { border: 0px none; background-color: transparent; width: 100%; height: 100%; z-index: 5; padding: 0; margin: 0 auto; position: absolute; top: 0; left: 0; right: 0; bottom: 0;}
        body { font-family: arial; margin: 0; padding: none; background-color: #fdfbe5; }
    </style>
</head>

<body>
    <div id="transfer" align=center>
        <div class="emscripten" id="status">Downloading...</div>
        <div class="emscripten">
            <progress value="0" max="100" id="progress"></progress>
        </div>
    </div>

    <canvas class="emscripten" id="canvas" width="1px" height="1px" oncontextmenu="event.preventDefault()" tabindex=1></canvas>
    <canvas class="emscripten" id="canvas3d" width="1280px" height="720px" oncontextmenu="event.preventDefault()" tabindex=1 hidden></canvas>

    <div id="infobox">Loading, please wait ...</div>
    <div id=html></div>

    <div id="pyconsole">
        <div id="terminal" tabIndex=1 align="left"></div>
    </div>

    <script type="application/javascript">
    globalThis.__canvas_resized = (self, ecw, ech) => { console.warn("TODO: panda3d canvas monitor", self, ecw, ech) }
    
    async function custom_onload(debug_hidden) {
        console.log(__FILE__, "custom_onload")
        pyconsole.hidden = debug_hidden
        transfer.hidden = debug_hidden
        show_infobox()
    }
    
    function custom_prerun() { console.log(__FILE__, "custom_prerun") }
    function custom_postrun() { console.log(__FILE__, "custom_postrun") }
    </script>
